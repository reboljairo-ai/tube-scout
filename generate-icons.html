<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TubeScout — Generador de Iconos</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0F1117; color: #E2E8F0; padding: 32px; }
    h2 { margin-bottom: 24px; }
    .icons { display: flex; gap: 32px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 32px; }
    .icon-wrap { text-align: center; }
    .icon-wrap p { font-size: 12px; color: #94A3B8; margin-top: 8px; }
    button {
      padding: 10px 24px; background: #6C63FF; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin: 4px;
    }
    button:hover { background: #5A52D5; }
    .btns { display: flex; flex-wrap: wrap; gap: 8px; }
  </style>
</head>
<body>
  <h2>🎯 TubeScout — Generador de Iconos PNG</h2>
  <div class="icons">
    <div class="icon-wrap">
      <canvas id="c16" width="16" height="16"></canvas>
      <p>16×16</p>
    </div>
    <div class="icon-wrap">
      <canvas id="c48" width="48" height="48"></canvas>
      <p>48×48</p>
    </div>
    <div class="icon-wrap">
      <canvas id="c128" width="128" height="128"></canvas>
      <p>128×128</p>
    </div>
  </div>
  <div class="btns">
    <button onclick="download('c16', 'icon16.png')">⬇ Descargar icon16.png</button>
    <button onclick="download('c48', 'icon48.png')">⬇ Descargar icon48.png</button>
    <button onclick="download('c128', 'icon128.png')">⬇ Descargar icon128.png</button>
  </div>
  <p style="margin-top:20px;color:#94A3B8;font-size:13px">
    Guarda los 3 archivos en <code style="background:#1A1D2E;padding:2px 6px;border-radius:4px">tube-scout/extension/icons/</code>
  </p>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const s = size;
      const r = s * 0.22; // corner radius

      // Background rounded rect
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#6C63FF';
      ctx.fill();

      const cx = s / 2;
      const cy = s / 2;
      const outerR = s * 0.3;
      const innerR = s * 0.1;
      const lineW = Math.max(1, s * 0.065);
      const gap = s * 0.32;
      const lineLen = s * 0.15;

      ctx.strokeStyle = 'white';
      ctx.lineWidth = lineW;
      ctx.lineCap = 'round';

      // Outer circle
      ctx.beginPath();
      ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
      ctx.stroke();

      // Inner dot
      ctx.beginPath();
      ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.fill();

      // Crosshair lines
      ctx.beginPath();
      ctx.moveTo(cx, cy - gap);
      ctx.lineTo(cx, cy - gap - lineLen);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cx, cy + gap);
      ctx.lineTo(cx, cy + gap + lineLen);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cx - gap, cy);
      ctx.lineTo(cx - gap - lineLen, cy);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cx + gap, cy);
      ctx.lineTo(cx + gap + lineLen, cy);
      ctx.stroke();
    }

    drawIcon('c16', 16);
    drawIcon('c48', 48);
    drawIcon('c128', 128);

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
